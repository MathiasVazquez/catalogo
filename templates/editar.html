{% extends 'base.html' %}

{% block content %}
<section class="encabezado-pagina">
    <div>
        <p class="ruta">Categorías / {{ categoria.nombre }} / Editar</p>
        <h2>Editar producto</h2>
        <p class="subtexto">Modifica los datos y guarda los cambios.</p>
    </div>
    <a class="btn-secundario" href="{{ url_for('ver_categoria', slug=categoria.slug) }}">← Volver</a>
</section>

<section class="bloque">
    <div class="bloque-titulo">
        <h3>Datos del producto</h3>
        <p>Actualiza la información del registro.</p>
    </div>

    <form method="POST" class="formulario-grid">
        <div class="campo campo-grande">
            <label for="descripcion">Descripción de mercadería</label>
            <input type="text" name="descripcion" id="descripcion" value="{{ producto.descripcion }}" required>
        </div>

        <div class="campo">
            <label for="precio_compra">Precio de compra</label>
            <input type="number" step="0.01" name="precio_compra" id="precio_compra" value="{{ producto.precio_compra }}" required>
        </div>

        <div class="campo">
            <label for="precio_reventa">Precio de reventa</label>
            <input type="number" step="0.01" name="precio_reventa" id="precio_reventa" value="{{ producto.precio_reventa }}" required>
        </div>

        <div class="campo campo-grande">
            <label for="lugar_compra">Lugar de compra</label>
            <input type="text" name="lugar_compra" id="lugar_compra" value="{{ producto.lugar_compra }}" required>
        </div>

        <div class="formulario-acciones">
            <button type="submit" class="btn-principal">Guardar cambios</button>
        </div>
    </form>
</section>
{% endblock %}
